<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Pricing control table" />
    <title>Madni Care Center • Pricing</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="pricing">
    <header class="topbar">
      <div class="container">
        <nav class="nav" aria-label="Main navigation">
          <a class="brand" href="index.html">
            <span class="logo" aria-hidden="true"></span>
            <span data-biz-name>Your Business Name</span>
          </a>
          <div class="spacer"></div>
          <div class="nav-links">
            <a data-nav data-nav="home" href="index.html">Home</a>
            <a data-nav data-nav="products" href="products.html">Shop</a>
            <a data-nav data-nav="about" href="about.html">About</a>
            <a data-nav data-nav="contact" href="contact.html">Contact</a>
            <a class="pill" href="cart.html" aria-label="Cart">
              Cart <span class="badge" data-cart-count>0</span>
            </a>
          </div>
        </nav>
      </div>
    </header>

    <div class="page-cover" aria-hidden="true"></div>

    <main class="section">
      <div class="container">
        <div id="pricingMount"></div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="row">
          <div class="stack" style="gap:4px;">
            <strong data-biz-name>Your Business Name</strong>
            <div class="tiny" data-biz-tagline>Modern wellness products crafted with care.</div>
          </div>
          <div class="spacer"></div>
          <div class="row">
            <a href="products.html">Shop</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
          </div>
        </div>
        <div class="divider"></div>
        <div class="tiny">© <span id="year"></span> <span data-biz-name>Your Business Name</span>.</div>
      </div>
    </footer>

    <div class="toast" id="toast" role="status" aria-live="polite">
      <span class="dot" aria-hidden="true"></span>
      <span data-toast-text>Updated</span>
    </div>
    <script src="app.js"></script>
    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
